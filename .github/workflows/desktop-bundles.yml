name: Desktop Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos
            os: macos-latest
            build-command: npm run tauri:build
          - name: linux
            os: ubuntu-22.04
            build-command: npm run tauri:build
          - name: windows
            os: windows-latest
            build-command: npm run tauri:build -- --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Sync desktop version from release tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          export RELEASE_VERSION="${RELEASE_TAG#v}"
          node <<'NODE'
          const fs = require('fs')

          const version = process.env.RELEASE_VERSION
          if (!version) {
            throw new Error('RELEASE_VERSION is missing')
          }

          function writeJson(path, updater) {
            const data = JSON.parse(fs.readFileSync(path, 'utf8'))
            updater(data)
            fs.writeFileSync(path, `${JSON.stringify(data, null, 2)}\n`)
          }

          writeJson('apps/desktop/package.json', (data) => {
            data.version = version
          })

          writeJson('apps/desktop/package-lock.json', (data) => {
            data.version = version
            if (data.packages && data.packages['']) {
              data.packages[''].version = version
            }
          })

          writeJson('apps/desktop/src-tauri/tauri.conf.json', (data) => {
            data.version = version
          })

          const cargoTomlPath = 'apps/desktop/src-tauri/Cargo.toml'
          const cargoToml = fs.readFileSync(cargoTomlPath, 'utf8')
          const nextCargoToml = cargoToml.replace(/^version = ".*"$/m, `version = "${version}"`)
          fs.writeFileSync(cargoTomlPath, nextCargoToml)
          NODE

      - name: Build desktop bundles
        working-directory: apps/desktop
        run: ${{ matrix.platform.build-command }}

      - name: Collect release assets
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          PLATFORM_NAME: ${{ matrix.platform.name }}
        run: |
          mkdir -p dist/release-assets
          version="$(node -p "require('./apps/desktop/package.json').version")"
          if [[ "${RELEASE_TAG:-}" == v* ]]; then
            version="${RELEASE_TAG#v}"
          fi

          normalize_arch() {
            case "$1" in
              x86_64|amd64)
                echo "x64"
                ;;
              arm64)
                echo "aarch64"
                ;;
              *)
                echo "$1"
                ;;
            esac
          }

          detect_arch() {
            local base="$1"
            for arch in aarch64 arm64 x86_64 x64 amd64 universal; do
              if [[ "$base" == *"$arch"* ]]; then
                normalize_arch "$arch"
                return
              fi
            done
            if [[ "$PLATFORM_NAME" == "windows" ]]; then
              echo "x64"
            fi
          }

          find target/release/bundle -type f \
            \( \
              -name '*.dmg' -o \
              -name '*.AppImage' -o \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.exe' \
            \) \
            -print0 | while IFS= read -r -d '' file; do
              base="$(basename "$file")"
              ext="${base##*.}"
              arch="$(detect_arch "$base")"
              target="dist/release-assets/loci-v${version}-${PLATFORM_NAME}"
              if [[ -n "$arch" ]]; then
                target="${target}-${arch}"
              fi
              target="${target}.${ext}"
              cp "$file" "$target"
            done

          if ! find dist/release-assets -maxdepth 1 -type f | grep -q .; then
            echo "No distributable release assets were collected."
            exit 1
          fi

          find dist/release-assets -maxdepth 1 -type f | sort

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: loci-desktop-${{ matrix.platform.name }}
          path: dist/release-assets
          if-no-files-found: error

  publish-release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-desktop
    runs-on: ubuntu-22.04

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: loci-desktop-*
          path: dist/release
          merge-multiple: true

      - name: Show release files
        run: find dist/release -type f | sort

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" --repo "$REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists, reusing it."
          else
            gh release create "$TAG_NAME" \
              --repo "$REPOSITORY" \
              --title "$TAG_NAME" \
              --generate-notes
          fi

      - name: Remove previously uploaded release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release view "$TAG_NAME" --repo "$REPOSITORY" --json assets --jq '.assets[].name' \
            | while IFS= read -r asset; do
                if [ -n "$asset" ]; then
                  gh release delete-asset "$TAG_NAME" "$asset" --repo "$REPOSITORY" -y
                fi
              done

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          find dist/release -type f -print0 | xargs -0 gh release upload "$TAG_NAME" --repo "$REPOSITORY" --clobber
