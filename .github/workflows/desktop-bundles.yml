name: Desktop Bundles

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos
            os: macos-latest
            build-command: npm run tauri:build
          - name: linux
            os: ubuntu-22.04
            build-command: npm run tauri:build
          - name: windows
            os: windows-latest
            build-command: npm run tauri:build -- --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build desktop bundles
        working-directory: apps/desktop
        run: ${{ matrix.platform.build-command }}

      - name: List bundle outputs (Unix)
        if: matrix.platform.name != 'windows'
        run: find target/release/bundle -maxdepth 3 -type f | sort

      - name: List bundle outputs (Windows)
        if: matrix.platform.name == 'windows'
        shell: pwsh
        run: Get-ChildItem -Path target/release/bundle -Recurse -File | Sort-Object FullName | Select-Object -ExpandProperty FullName

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: loci-desktop-${{ matrix.platform.name }}
          path: target/release/bundle
          if-no-files-found: error

  package-source:
    name: Package Source
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create source archives
        run: |
          mkdir -p dist/source
          git archive --format=tar.gz --output=dist/source/loci-source.tar.gz --prefix=loci/ HEAD
          git archive --format=zip --output=dist/source/loci-source.zip --prefix=loci/ HEAD

      - name: Upload source archives
        uses: actions/upload-artifact@v4
        with:
          name: loci-source
          path: |
            dist/source/loci-source.tar.gz
            dist/source/loci-source.zip
          if-no-files-found: error

  publish-release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-desktop
      - package-source
    runs-on: ubuntu-22.04

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: loci-desktop-*
          path: dist/release

      - name: Download source artifacts
        uses: actions/download-artifact@v4
        with:
          name: loci-source
          path: dist/release/loci-source

      - name: Show release files
        run: find dist/release -type f | sort

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" --repo "$REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists, reusing it."
          else
            gh release create "$TAG_NAME" \
              --repo "$REPOSITORY" \
              --title "$TAG_NAME" \
              --generate-notes
          fi

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          find dist/release -type f -print0 | xargs -0 gh release upload "$TAG_NAME" --repo "$REPOSITORY" --clobber
